name: API Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    name: Smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # API tests use Playwright's request context and never launch a browser,
      # so we skip `npx playwright install` entirely — faster, lighter CI.
      - name: Run smoke tests
        run: npm run test:smoke

  full-suite:
    name: Full suite (E2E + negative)
    runs-on: ubuntu-latest
    needs: smoke # only run the heavier suite once smoke passes — deploy-gate pattern
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run full test suite
        run: npm test

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
